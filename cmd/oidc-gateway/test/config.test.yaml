# Test config for OIDC ext-authz integration tests.
# Allows mock user for /api/* paths.

claims:
  principalClaim: "email"
  emailClaimPath: "email"

headers:
  authPrincipal: "x-auth-principal"

issuers:
  - providerKey: "dex"
    provider: "https://dex.example.com"
    authFamily: "oidc"
  - provider: "https://spire-oidc.example.org"
    authFamily: "spiffe"

denyList: []

publicPaths:
  - "/healthz"

roles:
  admin:
    allowedMethods: ["*"]
    principals:
      - "oidc:dex:admin@example.com"
  spiffe-admin:
    allowedMethods: ["*"]
    principals:
      - "spiffe:*"
