# Test config for OIDC ext-authz integration tests.
# Allows mock user for /api/* paths.

claims:
  userID: "email"
  emailPath: "email"

issuers:
  - provider: "https://dex.example.com"
    principalType: "user"

principalType:
  mode: "user"
  machineIdentityClaim: ""
  machineSubPattern: ""

userDenyList: []

publicPaths:
  - "/healthz"

roles:
  admin:
    allowedMethods: ["*"]
    users:
      - "user:https://dex.example.com:admin@example.com"
