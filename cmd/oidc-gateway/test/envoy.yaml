# Envoy configuration for testing multi-token ext_authz integration.
# Implements: header mutation, OIDC jwt_authn providers, SPIFFE signal passthrough.

node:
  id: "test-envoy"
  cluster: "test-cluster"

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: main_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080

      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                http2_protocol_options: {}
                forward_client_cert_details: APPEND_FORWARD
                set_current_client_cert_details:
                  uri: true

                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog

                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        # Health check - no auth required
                        - match:
                            path: "/healthz"
                          direct_response:
                            status: 200
                            body:
                              inline_string: '{"status":"healthy","service":"envoy-gateway"}'
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true

                        # JWT route - Bearer token validated by jwt_authn, header_mutation strips x-jwt-payload
                        - match:
                            prefix: "/api/jwt"
                          route:
                            cluster: mock_backend
                            timeout: 30s
                          request_headers_to_remove:
                            - "authorization"
                          typed_per_filter_config:
                            envoy.filters.http.header_mutation:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.header_mutation.v3.HeaderMutationPerRoute
                              mutations:
                                request_mutations:
                                  - remove: "x-jwt-payload"

                        # Dev/test route - x-jwt-payload passthrough (no JWT validation)
                        - match:
                            prefix: "/api/test"
                          route:
                            cluster: mock_backend
                            timeout: 30s
                          request_headers_to_remove:
                            - "authorization"

                        # All other requests go through ext_authz.
                        # If credentials are missing/invalid, ext_authz returns deny.
                        - match:
                            prefix: "/"
                          route:
                            cluster: mock_backend
                            timeout: 30s
                          request_headers_to_remove:
                            - "authorization"

                http_filters:
                  # 1. Header Mutation
                  # Always strip client-supplied x-auth-principal to prevent identity spoofing.
                  # Keep x-jwt-payload only for /api/test dev passthrough (authn input to ext_authz).
                  # /api/jwt has additional per-route stripping for client-supplied x-jwt-payload.
                  - name: envoy.filters.http.header_mutation
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.header_mutation.v3.HeaderMutation
                      mutations:
                        request_mutations:
                          - remove: "x-auth-principal"

                  # 2. JWT Authentication - multiple issuers
                  - name: envoy.filters.http.jwt_authn
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                      providers:
                        dex:
                          issuer: "https://dex.example.com"
                          local_jwks:
                            # Test key - use real JWKS in production (remote_jwks from IdP)
                            inline_string: '{"keys":[{"kty":"RSA","n":"0vx7agoebGcQSuuPiLJXZptN9nndrQmbXEps2aiAFbWhM78LhWx4cbbfAAtVT86zwu1RK7aPFFxuhDR1L6tSoc_BJECPebWKRXjBZCiFV4n3oknjhMstn64tZ_2W-5JsGY4Hc5n9yBXArwl93lqt7_RN5w6Cf0h4QyQ5v-65YGjQR0_FDW2QvzqY368QQMicAtaSqzs8KJZgnYb9c7d0zgdAZHzu6qMQvRL5hajrn1n91CbOpbISD08qNLyrdkt-bFTWhAI4vMQFh6WeZu0fM4lFd2NcRwr3XPksINHaQ-G_xBniIqbw0Ls1jF44-csFCur-kEgU8awapJzKnqDKgw","e":"AQAB","alg":"RS256","kid":"2011-04-29"}]}'
                          from_headers:
                            - name: Authorization
                              value_prefix: "Bearer "
                          forward: true
                          forward_payload_header: "x-jwt-payload"
                        github:
                          issuer: "https://token.actions.githubusercontent.com"
                          remote_jwks:
                            http_uri:
                              uri: "https://token.actions.githubusercontent.com/.well-known/jwks"
                              cluster: jwks_github
                              timeout: 5s
                            cache_duration:
                              seconds: 300
                          from_headers:
                            - name: Authorization
                              value_prefix: "Bearer "
                          forward: true
                          forward_payload_header: "x-jwt-payload"
                      rules:
                        - match:
                            prefix: "/api/jwt"
                          requires:
                            requires_any:
                              requirements:
                                - provider_name: dex
                                - provider_name: github
                        # /api/test: no JWT required - x-jwt-payload passthrough for dev testing
                        - match:
                            prefix: "/api/test"
                        # Catch-all: no JWT required (ext_authz will deny if no payload)
                        - match:
                            prefix: "/"

                  # 3. External authorization (Casbin RBAC over canonical principals)
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      transport_api_version: V3
                      grpc_service:
                        envoy_grpc:
                          cluster_name: ext_authz
                        timeout: 5s
                      failure_mode_allow: false
                      include_peer_certificate: true
                      include_tls_session: true
                      # Note: allowed_upstream_headers is HTTP-only (authorization_response).
                      # For gRPC ext_authz, response headers are forwarded to upstream by default.

                  # Router filter (must be last)
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # ExtAuthz service (OIDC + Casbin)
    - name: ext_authz
      type: STRICT_DNS
      connect_timeout: 1s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: ext_authz
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: oidc-gateway
                      port_value: 9002

    # JWKS for GitHub OIDC
    - name: jwks_github
      type: STRICT_DNS
      connect_timeout: 5s
      load_assignment:
        cluster_name: jwks_github
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: token.actions.githubusercontent.com
                      port_value: 443
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: token.actions.githubusercontent.com

    # Mock backend
    - name: mock_backend
      type: STRICT_DNS
      connect_timeout: 1s
      load_assignment:
        cluster_name: mock_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: mock-backend
                      port_value: 8888
