# OIDC ext-authz configuration
# Roles come only from config; no roles are extracted from JWT claims.
# All values are user-specific - provide your own for your infrastructure.

claims:
  principalClaim: "sub"
  emailClaimPath: "email"

# Issuer mapping for canonical principal extraction.
# authFamily: oidc | spiffe
# Example:
# issuers:
#   - providerKey: "dex"
#     provider: "https://dex.example.com"
#     authFamily: "oidc"
#   - providerKey: "github"
#     provider: "https://token.actions.githubusercontent.com"
#     authFamily: "oidc"
issuers: []

denyList: []

publicPaths:
  - "/healthz"
  - "/grpc.reflection"

roles:
  # Example admin: principals: ["oidc:dex:admin@example.com"]
  admin:
    allowedMethods: ["*"]
    principals: []
  # Example viewer: restrict to specific gRPC methods or HTTP paths
  # viewer:
  #   allowedMethods:
  #     - "/example.service.v1.ExampleService/Read"
  #   principals: ["oidc:dex:viewer@example.com"]
  # Example GitHub Actions workflow identity:
  # deployer:
  #   allowedMethods: ["*"]
  #   principals:
  #     - "oidc:github:repo:your-org/your-repo:workflow:deploy.yml:ref:refs/heads/main"
