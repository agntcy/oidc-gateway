version: "3"

vars:
  ## Version
  RELEASE_VERSION:
    sh: grep 'version:' versions.yaml | awk '{print $2}'
  COMMIT_SHA:
    sh: git rev-parse --short HEAD

  ## Image config
  BUILD_LDFLAGS: "-s -w -extldflags -static"
  IMAGE_REPO: '{{ .IMAGE_REPO | default "ghcr.io/agntcy" }}'
  IMAGE_TAG: "{{ .IMAGE_TAG | default .COMMIT_SHA }}"
  IMAGE_NAME: "oidc-gateway"
  BAKE_ENV: 'IMAGE_REPO={{.IMAGE_REPO}} IMAGE_TAG={{.IMAGE_TAG}} BUILD_LDFLAGS="{{.BUILD_LDFLAGS}}"'
  IMAGE_BAKE_OPTS: '{{ .IMAGE_BAKE_OPTS | default "" }}'

  ## Container images for vulnerability scanning
  VULN_SCAN_IMAGES:
    - "{{.IMAGE_REPO}}/oidc-gateway:{{.IMAGE_TAG}}"

  ## Dependency config
  BIN_DIR: "{{ .ROOT_DIR }}/.bin"
  RENOVATE_VERSION: "43.89.5"
  GO_VERSION: "1.26.3"
  # renovate: datasource=github-tags depName=golangci/golangci-lint versioning=semver
  GOLANGCI_LINT_VERSION: "2.12.2"
  GOLANGCI_LINT_BIN: "{{ .BIN_DIR }}/golangci-lint-{{.GOLANGCI_LINT_VERSION}}"
  # renovate: datasource=github-tags depName=goph/licensei versioning=semver
  LICENSEI_VERSION: "0.9.0"
  LICENSEI_BIN: "{{ .BIN_DIR }}/licensei-{{.LICENSEI_VERSION}}"
  # renovate: datasource=github-tags depName=helm/helm versioning=semver
  HELM_VERSION: "4.2.2"
  HELM_BIN: "{{ .BIN_DIR }}/helm-{{.HELM_VERSION}}"
  # renovate: datasource=github-tags depName=open-telemetry/opentelemetry-go-build-tools versioning=semver
  MULTIMOD_VERSION: "0.30.0"
  MULTIMOD_BIN: "{{ .BIN_DIR }}/multimod-{{.MULTIMOD_VERSION}}"
  # renovate: datasource=github-tags depName=pre-commit/pre-commit versioning=semver
  PRE_COMMIT_VERSION: "4.6.0"
  PRE_COMMIT_PYZ: "{{ .BIN_DIR }}/pre-commit-{{.PRE_COMMIT_VERSION}}.pyz"
  # renovate: datasource=go depName=sigs.k8s.io/kind versioning=semver
  KIND_VERSION: "0.32.0"
  KIND_BIN: "{{ .BIN_DIR }}/kind-{{.KIND_VERSION}}"

  ## Go module discovery
  GO_MODULES:
    sh: 'find . -name go.mod -not -path "./tmp*" -exec dirname {} \;'
  GO_MODULES_UNIT_TEST:
    sh: 'find . -name go.mod -not -path "./tmp*" -not -path "./tests/*" -exec dirname {} \;'

  ## Coverage
  COVERAGE_DIR: '{{ .COVERAGE_DIR | default (print .ROOT_DIR "/.coverage") }}'
