{{- define "oidc-gateway.envoyListener" -}}
{{- $root := .root -}}
{{- $name := .name -}}
{{- $port := .port -}}
{{- $tlsEnabled := .tlsEnabled -}}
{{- $requireClientCertificate := .requireClientCertificate -}}
{{- $includeJwtAuth := .includeJwtAuth -}}
{{- $hasIssuers := (or $root.Values.envoy.oidc.issuers $root.Values.envoy.oidc.github.enabled) -}}
{{- $ratelimit := $root.Values.envoy.ratelimit -}}
{{- if and $tlsEnabled (not $root.Values.envoy.spiffe.enabled) -}}
{{- fail (printf "Envoy listener %s enables downstream TLS but envoy.spiffe.enabled is false" $name) -}}
{{- end -}}
{{/* The enabled OIDC issuers, including GitHub */}}
{{- $enabledIssuers := list -}}
{{- range $root.Values.envoy.oidc.issuers -}}
{{- if .enabled -}}
{{- $enabledIssuers = append $enabledIssuers .name -}}
{{- end -}}
{{- end -}}
{{- if $root.Values.envoy.oidc.github.enabled -}}
{{- $enabledIssuers = append $enabledIssuers "github" -}}
{{- end -}}
- name: {{ $name }}
  address:
    socket_address:
      address: 0.0.0.0
      port_value: {{ $port }}
  filter_chains:
    - {{- if $tlsEnabled }}
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
          require_client_certificate: {{ $requireClientCertificate }}
          common_tls_context:
            alpn_protocols:
              - h2
            tls_certificate_sds_secret_configs:
            - name: {{ printf "spiffe://%s/ns/%s/sa/%s" (default "example.org" $root.Values.envoy.spiffe.trustDomain) $root.Release.Namespace (include "oidc-gateway.envoyServiceAccountName" $root) | quote }}
              sds_config:
                api_config_source:
                  api_type: GRPC
                  grpc_services:
                  - envoy_grpc:
                      cluster_name: spiffe_agent
            combined_validation_context:
              default_validation_context:
                match_typed_subject_alt_names:
                  - san_type: URI
                    matcher:
                      prefix: {{ printf "spiffe://%s/" (default "example.org" $root.Values.envoy.spiffe.trustDomain) | quote }}
              validation_context_sds_secret_config:
                name: {{ printf "spiffe://%s" (default "example.org" $root.Values.envoy.spiffe.trustDomain) | quote }}
                sds_config:
                  api_config_source:
                    api_type: GRPC
                    grpc_services:
                    - envoy_grpc:
                        cluster_name: spiffe_agent
      {{- end }}
      filters:
        - name: envoy.filters.network.http_connection_manager
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
            stat_prefix: {{ $name }}
            codec_type: AUTO
            http2_protocol_options: {}
            forward_client_cert_details: APPEND_FORWARD
            set_current_client_cert_details:
              uri: true
            access_log:
              - name: envoy.access_loggers.stdout
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
            route_config:
              name: {{ $name }}_route
              virtual_hosts:
                - name: backend
                  domains: ["*"]
                  routes:
                    # Health check - no auth
                    - match:
                        path: "/healthz"
                      direct_response:
                        status: 200
                        body:
                          inline_string: '{"status":"healthy"}'
                      typed_per_filter_config:
                        envoy.filters.http.ext_authz:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                          disabled: true
                    # Long-lived server-streaming RPC route (optional, configurable timeout)
                    {{- if $root.Values.envoy.backend.streamingPath }}
                    # x-auth-principal header is present
                    - match:
                        path: {{ $root.Values.envoy.backend.streamingPath | quote }}
                        headers:
                          - name: x-auth-principal
                            present_match: true
                      route:
                        cluster: backend
                        timeout: {{ $root.Values.envoy.backend.listenRouteTimeout }}
                      request_headers_to_remove:
                        - "authorization"
                      typed_per_filter_config:
                        {{- include "oidc-gateway.envoyLocalRateLimit" (dict
                          "key" "streaming_per_client"
                          "enabled" $ratelimit.perClient.enabled
                          "bucket" $ratelimit.perClient.tokenBucket
                        ) | nindent 24 }}
                    # x-auth-principal header is not present
                    - match:
                        path: {{ $root.Values.envoy.backend.streamingPath | quote }}
                      route:
                        cluster: backend
                        timeout: {{ $root.Values.envoy.backend.listenRouteTimeout }}
                      request_headers_to_remove:
                        - "authorization"
                      typed_per_filter_config:
                        {{- include "oidc-gateway.envoyLocalRateLimit" (dict
                          "key" "streaming_global"
                          "enabled" $ratelimit.global.enabled
                          "bucket" $ratelimit.global.tokenBucket
                        ) | nindent 24 }}
                    {{- end }}
                    # gRPC reflection - no JWT required, no ext_authz (public)
                    - match:
                        prefix: "/grpc.reflection"
                      route:
                        cluster: backend
                        timeout: {{ $root.Values.envoy.backend.timeout }}
                      request_headers_to_remove:
                        - "authorization"
                      typed_per_filter_config:
                        envoy.filters.http.ext_authz:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                          disabled: true
                    # Catch-all - ext_authz decides whether X.509-SVID or bearer JWT auth is present.
                    - match:
                        prefix: "/"
                        headers:
                          - name: x-auth-principal
                            present_match: true
                      route:
                        cluster: backend
                        timeout: {{ $root.Values.envoy.backend.timeout }}
                      request_headers_to_remove:
                        - "authorization"
                      typed_per_filter_config:
                        {{- include "oidc-gateway.envoyLocalRateLimit" (dict
                          "key" "per_client"
                          "enabled" $ratelimit.perClient.enabled
                          "bucket" $ratelimit.perClient.tokenBucket
                        ) | nindent 24 }}
                    - match:
                        prefix: "/"
                      route:
                        cluster: backend
                        timeout: {{ $root.Values.envoy.backend.timeout }}
                      request_headers_to_remove:
                        - "authorization"
                      typed_per_filter_config:
                        {{- include "oidc-gateway.envoyLocalRateLimit" (dict
                          "key" "global"
                          "enabled" $ratelimit.global.enabled
                          "bucket" $ratelimit.global.tokenBucket
                        ) | nindent 24 }}
            http_filters:
              # 1. Header Mutation - strip client-supplied identity inputs (defense-in-depth)
              - name: envoy.filters.http.header_mutation
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.header_mutation.v3.HeaderMutation
                  mutations:
                    request_mutations:
                      - remove: "x-jwt-payload"
                      - remove: {{ default "x-auth-principal" $root.Values.authServer.oidc.headers.authPrincipal | quote }}
              {{- if and $includeJwtAuth $hasIssuers }}
              # 2. JWT Authentication - one provider per configured issuer
              - name: envoy.filters.http.jwt_authn
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                  providers:
                    {{- range $root.Values.envoy.oidc.issuers }}
                    {{- if .enabled }}
                    {{ .name }}:
                      issuer: {{ .issuer | quote }}
                      remote_jwks:
                        http_uri:
                          uri: {{ .jwksUri | quote }}
                          cluster: jwks_{{ .name }}
                          timeout: {{ $root.Values.envoy.oidc.jwksTimeout }}
                        cache_duration:
                          seconds: {{ $root.Values.envoy.oidc.jwksCacheSeconds }}
                      from_headers:
                        - name: Authorization
                          value_prefix: 'Bearer '
                      {{- if .audiences }}
                      audiences:
                        {{- range .audiences }}
                        - {{ . | quote }}
                        {{- end }}
                      {{- end }}
                      forward: true
                      forward_payload_header: 'x-jwt-payload'
                    {{- end }}
                    {{- end }}
                    {{- if $root.Values.envoy.oidc.github.enabled }}
                    github:
                      issuer: {{ $root.Values.envoy.oidc.github.issuer | quote }}
                      remote_jwks:
                        http_uri:
                          uri: {{ $root.Values.envoy.oidc.github.jwksUri | quote }}
                          cluster: jwks_github
                          timeout: {{ $root.Values.envoy.oidc.jwksTimeout }}
                        cache_duration:
                          seconds: {{ $root.Values.envoy.oidc.jwksCacheSeconds }}
                      from_headers:
                        - name: Authorization
                          value_prefix: 'Bearer '
                      {{- if $root.Values.envoy.oidc.github.audiences }}
                      audiences:
                        {{- range $root.Values.envoy.oidc.github.audiences }}
                        - {{ . | quote }}
                        {{- end }}
                      {{- end }}
                      forward: true
                      forward_payload_header: 'x-jwt-payload'
                    {{- end }}
                  rules:
                    # Public paths: no JWT required — must come before the catch-all
                    - match:
                        path: "/healthz"
                    - match:
                        # gRPC reflection prefix — excludes all reflection sub-methods
                        prefix: "/grpc.reflection"
                    # All other paths: require a valid JWT from any configured issuer
                    - match:
                        prefix: "/"
                      requires:
                        {{- if eq (len $enabledIssuers) 1 }}
                        provider_name: {{ index $enabledIssuers 0 }}
                        {{- else }}
                        requires_any:
                          requirements:
                            {{- range $enabledIssuers }}
                            - provider_name: {{ .name }}
                            {{- end }}
                        {{- end }}
              {{- end }}
              # 3. External authorization - OIDC ext_authz (Casbin RBAC)
              - name: envoy.filters.http.ext_authz
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                  transport_api_version: V3
                  grpc_service:
                    envoy_grpc:
                      cluster_name: ext_authz
                    timeout: 5s
                  failure_mode_allow: false
                  include_peer_certificate: true
                  include_tls_session: true
              # 4. Local rate limit after ext_authz (rate limit per x-auth-principal header)
              - name: envoy.filters.http.local_ratelimit
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                  stat_prefix: http_local_rate_limiter
              # Router filter (must be last)
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
{{- end -}}

{{- $mtlsEnabled := .Values.envoy.endpoints.mtls.enabled -}}
{{- $oidcPort := .Values.envoy.endpoints.oidc.port -}}
{{- $mtlsPort := default 8443 .Values.envoy.endpoints.mtls.port -}}
{{- $oidcTlsEnabled := .Values.envoy.endpoints.oidc.downstreamTls.enabled -}}
{{- $oidcRequireClientCertificate := .Values.envoy.endpoints.oidc.downstreamTls.requireClientCertificate -}}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oidc-gateway.fullname" . }}-envoy-config
  labels:
    {{- include "oidc-gateway.envoyLabels" . | nindent 4 }}
data:
  envoy.yaml: |
    node:
      id: {{ include "oidc-gateway.fullname" . }}-envoy
      cluster: "{{ .Release.Namespace }}"

    {{- if .Values.envoy.admin.enabled }}
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: {{ .Values.envoy.admin.port }}
    {{- end }}

    static_resources:
      listeners:
        {{- if .Values.envoy.endpoints.oidc.enabled }}
        {{- include "oidc-gateway.envoyListener" (dict "root" . "name" "oidc_listener" "port" $oidcPort "tlsEnabled" $oidcTlsEnabled "requireClientCertificate" $oidcRequireClientCertificate "includeJwtAuth" true) | nindent 8 }}
        {{- end }}
        {{- if $mtlsEnabled }}
        {{- include "oidc-gateway.envoyListener" (dict "root" . "name" "mtls_listener" "port" $mtlsPort "tlsEnabled" .Values.envoy.endpoints.mtls.downstreamTls.enabled "requireClientCertificate" .Values.envoy.endpoints.mtls.downstreamTls.requireClientCertificate "includeJwtAuth" false) | nindent 8 }}
        {{- end }}
      clusters:
        # ExtAuthz service
        - name: ext_authz
          type: STRICT_DNS
          connect_timeout: 1s
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: ext_authz
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "oidc-gateway.fullname" . }}-authz
                          port_value: {{ .Values.authServer.service.port }}

        # Upstream backend service
        - name: backend
          type: STRICT_DNS
          connect_timeout: 1s
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.envoy.backend.address }}
                          port_value: {{ .Values.envoy.backend.port }}
          {{- if .Values.envoy.spiffe.enabled }}
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              common_tls_context:
                # Present our SPIFFE identity to the backend
                tls_certificate_sds_secret_configs:
                - name: {{ printf "spiffe://%s/ns/%s/sa/%s" (default "example.org" .Values.envoy.spiffe.trustDomain) .Release.Namespace (include "oidc-gateway.envoyServiceAccountName" .) | quote }}
                  sds_config:
                    api_config_source:
                      api_type: GRPC
                      grpc_services:
                      - envoy_grpc:
                          cluster_name: spiffe_agent
                # Validate backend peer certificate via SPIRE trust bundle
                combined_validation_context:
                  default_validation_context:
                    match_typed_subject_alt_names:
                      - san_type: URI
                        matcher:
                          prefix: {{ printf "spiffe://%s/" (default "example.org" .Values.envoy.spiffe.trustDomain) | quote }}
                  validation_context_sds_secret_config:
                    name: {{ printf "spiffe://%s" (default "example.org" .Values.envoy.spiffe.trustDomain) | quote }}
                    sds_config:
                      api_config_source:
                        api_type: GRPC
                        grpc_services:
                        - envoy_grpc:
                            cluster_name: spiffe_agent
          {{- end }}

        {{- range .Values.envoy.oidc.issuers }}
        {{- if .enabled }}
        # JWKS cluster for issuer: {{ .name }}
        - name: jwks_{{ .name }}
          type: STRICT_DNS
          connect_timeout: {{ $.Values.envoy.oidc.jwksTimeout }}
          load_assignment:
            cluster_name: jwks_{{ .name }}
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .jwksHost }}
                          port_value: {{ default 443 .jwksPort }}
          {{- $jwksTls := true -}}
          {{- if kindIs "bool" .jwksTls -}}
          {{- $jwksTls = .jwksTls -}}
          {{- end -}}
          {{- if $jwksTls }}
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              sni: {{ .jwksHost }}
          {{- end }}
        {{- end }}
        {{- end }}

        {{- if .Values.envoy.oidc.github.enabled }}
        # JWKS for GitHub OIDC
        - name: jwks_github
          type: STRICT_DNS
          connect_timeout: {{ .Values.envoy.oidc.jwksTimeout }}
          load_assignment:
            cluster_name: jwks_github
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.envoy.oidc.github.jwksHost }}
                          port_value: 443
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              sni: {{ .Values.envoy.oidc.github.jwksHost }}
        {{- end }}

        {{- if .Values.envoy.spiffe.enabled }}
        # SPIRE agent cluster (for SDS)
        - name: spiffe_agent
          type: STATIC
          connect_timeout: 1s
          http2_protocol_options: {}
          load_assignment:
            cluster_name: spiffe_agent
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        pipe:
                          path: /run/spire/agent-sockets/{{ .Values.envoy.spiffe.agentSocketName | default "api.sock" }}
        {{- end }}
