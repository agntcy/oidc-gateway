apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oidc-gateway.fullname" . }}-authz-config
  labels:
    {{- include "oidc-gateway.authzLabels" . | nindent 4 }}
data:
  # Server env (used by deployment)
  LISTEN_ADDRESS: {{ .Values.authServer.config.listenAddress | quote }}
  LOG_LEVEL: {{ .Values.authServer.config.logLevel | quote }}
  CONFIG_PATH: "/etc/oidc-gateway/config.yaml"

  # OIDC config (single file loaded by ext-authz server)
  config.yaml: |
    # OIDC ext-authz configuration. Roles from config only; no roles from JWT claims.
    claims:
      userID: {{ .Values.authServer.oidc.claims.userID | quote }}
      emailPath: {{ .Values.authServer.oidc.claims.emailPath | quote }}

    issuers:
      {{- if .Values.authServer.oidc.issuers }}
      {{- range .Values.authServer.oidc.issuers }}
      - provider: {{ .provider | quote }}
        principalType: {{ .principalType | quote }}
        {{- if .machineIdentityClaim }}
        machineIdentityClaim: {{ .machineIdentityClaim | quote }}
        {{- end }}
        {{- if .machineSubPattern }}
        machineSubPattern: {{ .machineSubPattern | quote }}
        {{- end }}
      {{- end }}
      {{- else }}
      []
      {{- end }}

    principalType:
      mode: {{ .Values.authServer.oidc.principalType.mode | quote }}
      machineIdentityClaim: {{ .Values.authServer.oidc.principalType.machineIdentityClaim | quote }}
      {{- if .Values.authServer.oidc.principalType.machineSubPattern }}
      machineSubPattern: {{ .Values.authServer.oidc.principalType.machineSubPattern | quote }}
      {{- else }}
      machineSubPattern: ""
      {{- end }}

    userDenyList:
      {{- if .Values.authServer.oidc.userDenyList }}
      {{- range .Values.authServer.oidc.userDenyList }}
      - {{ . | quote }}
      {{- end }}
      {{- else }}
      []
      {{- end }}

    publicPaths:
      {{- range .Values.authServer.oidc.publicPaths }}
      - {{ . | quote }}
      {{- end }}

    roles:
      {{- if .Values.authServer.oidc.roles }}
      {{- range $roleName, $role := .Values.authServer.oidc.roles }}
      {{ $roleName }}:
        allowedMethods:
          {{- range $role.allowedMethods }}
          - {{ . | quote }}
          {{- end }}
        {{- if $role.users }}
        users:
          {{- range $role.users }}
          - {{ . | quote }}
          {{- end }}
        {{- else }}
        users: []
        {{- end }}
        {{- if $role.clients }}
        clients:
          {{- range $role.clients }}
          - {{ . | quote }}
          {{- end }}
        {{- else }}
        clients: []
        {{- end }}
        {{- if $role.githubWorkflows }}
        githubWorkflows:
          {{- range $role.githubWorkflows }}
          - {{ . | quote }}
          {{- end }}
        {{- else }}
        githubWorkflows: []
        {{- end }}
      {{- end }}
      {{- else }}
      {}
      {{- end }}
