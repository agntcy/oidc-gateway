apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oidc-gateway.fullname" . }}-authz-config
  labels:
    {{- include "oidc-gateway.authzLabels" . | nindent 4 }}
data:
  # Server env (used by deployment)
  LISTEN_ADDRESS: {{ .Values.authServer.config.listenAddress | quote }}
  LOG_LEVEL: {{ .Values.authServer.config.logLevel | quote }}
  CONFIG_PATH: "/etc/oidc-gateway/config.yaml"

  # OIDC config (single file loaded by ext-authz server)
  config.yaml: |
    # OIDC ext-authz configuration. Roles from config only; no roles from JWT claims.
    claims:
      principalClaim: {{ .Values.authServer.oidc.claims.principalClaim | quote }}
      emailClaimPath: {{ .Values.authServer.oidc.claims.emailClaimPath | quote }}

    headers:
      authPrincipal: {{ default "x-auth-principal" .Values.authServer.oidc.headers.authPrincipal | quote }}

    issuers:
      {{- if .Values.authServer.oidc.issuers }}
      {{- range .Values.authServer.oidc.issuers }}
      - providerKey: {{ .providerKey | quote }}
        provider: {{ .provider | quote }}
        authFamily: {{ default "oidc" .authFamily | quote }}
      {{- end }}
      {{- else }}
      []
      {{- end }}

    spiffeJwt:
      enabled: {{ .Values.authServer.oidc.spiffeJwt.enabled }}
      socketPath: {{ .Values.authServer.oidc.spiffeJwt.socketPath | quote }}
      audiences:
        {{- if .Values.authServer.oidc.spiffeJwt.audiences }}
        {{- range .Values.authServer.oidc.spiffeJwt.audiences }}
        - {{ . | quote }}
        {{- end }}
        {{- else }}
        []
        {{- end }}

    denyList:
      {{- if .Values.authServer.oidc.denyList }}
      {{- range .Values.authServer.oidc.denyList }}
      - {{ . | quote }}
      {{- end }}
      {{- else }}
      []
      {{- end }}

    publicPaths:
      {{- range .Values.authServer.oidc.publicPaths }}
      - {{ . | quote }}
      {{- end }}

    roles:
      {{- if .Values.authServer.oidc.roles }}
      {{- range $roleName, $role := .Values.authServer.oidc.roles }}
      {{ $roleName }}:
        allowedMethods:
          {{- range $role.allowedMethods }}
          - {{ . | quote }}
          {{- end }}
        {{- if $role.principals }}
        principals:
          {{- range $role.principals }}
          - {{ . | quote }}
          {{- end }}
        {{- else }}
        principals: []
        {{- end }}
      {{- end }}
      {{- else }}
      {}
      {{- end }}

    ratelimit:
      domain: {{ .Values.ratelimit.domain | quote }}
      authenticated:
        enabled: {{ .Values.ratelimit.authServer.authenticated.enabled }}
        rps: {{ .Values.ratelimit.authServer.authenticated.rps }}
        burst: {{ .Values.ratelimit.authServer.authenticated.burst }}
      anonymous:
        enabled: {{ .Values.ratelimit.authServer.anonymous.enabled }}
        rps: {{ .Values.ratelimit.authServer.anonymous.rps }}
        burst: {{ .Values.ratelimit.authServer.anonymous.burst }}
