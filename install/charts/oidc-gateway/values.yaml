# Global configuration
nameOverride: ""
fullnameOverride: ""

# Envoy Gateway configuration
envoy:
  replicaCount: 1

  image:
    repository: envoyproxy/envoy
    tag: distroless-v1.37-latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    annotations: {}

  # Downstream endpoint configuration.
  # Enable mtls to expose a second Envoy listener for SPIFFE X.509-SVID callers.
  endpoints:
    oidc:
      enabled: true
      port: 8080
      servicePort: 8080
      downstreamTls:
        enabled: false
        requireClientCertificate: false
    mtls:
      enabled: false
      port: 8443
      servicePort: 8443
      downstreamTls:
        enabled: true
        requireClientCertificate: true

  # Backend service configuration
  backend:
    # Address of the upstream backend service
    # Example: my-service.my-namespace.svc.cluster.local
    address: ""
    port: 8888
    # Default Envoy route timeout for backend requests.
    timeout: 30s
    # Optional: path of a long-lived server-streaming RPC endpoint.
    # When set, this path gets a separate route with listenRouteTimeout.
    # Example: "/example.service.v1.EventService/Stream"
    streamingPath: ""
    # Dedicated route timeout for long-lived server-streaming RPCs.
    # Use 0s to disable the timeout for streaming endpoints only.
    listenRouteTimeout: 0s

  # OIDC/JWT configuration for jwt_authn filter
  oidc:
    # Generic OIDC issuers. Add one entry per identity provider.
    # Each entry creates one Envoy jwt_authn provider and one JWKS cluster.
    # The name must be unique and a valid Envoy cluster name (alphanumeric + hyphen).
    # Example:
    # issuers:
    #   - name: primary
    #     enabled: true
    #     issuer: "https://your-idp.example.com"
    #     jwksUri: "https://your-idp.example.com/.well-known/jwks.json"
    #     jwksHost: "your-idp.example.com"
    #     audiences: []  # optional audience enforcement
    issuers: []

    # GitHub Actions OIDC issuer (special case).
    # The authzserver has dedicated principal extraction for GitHub OIDC tokens,
    # producing oidc:github:repo:... principals for use in RBAC roles.
    github:
      enabled: false
      issuer: "https://token.actions.githubusercontent.com"
      jwksUri: "https://token.actions.githubusercontent.com/.well-known/jwks"
      jwksHost: "token.actions.githubusercontent.com"
      # Optional: restrict which audience values are accepted in GitHub OIDC tokens.
      audiences: []

    jwksTimeout: 5s
    jwksCacheSeconds: 300

  # SPIFFE integration for mTLS with backend
  spiffe:
    enabled: true
    # SPIFFE ID will be: spiffe://{trustDomain}/ns/{namespace}/sa/envoy-gateway
    # Assigned automatically by SPIRE
    #
    # Trust domain (must match SPIRE deployment)
    trustDomain: example.org
    # SPIRE controller className (must match SPIRE Controller Manager deployment)
    # Default: "spire" — override if your SPIRE install uses a different class name
    # Set to "none" to omit className field for classless SPIRE controllers
    className: spire
    # Optional: restrict ClusterSPIFFEID to specific namespace(s)
    # Required on OpenShift when SPIRE operator scopes by namespace
    namespaceSelector: {}
    # SPIRE agent socket filename (may differ on OpenShift managed SPIRE operators)
    agentSocketName: api.sock

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Admin interface (for debugging)
  admin:
    enabled: true
    port: 9901

# Authorization Server configuration (OIDC + Casbin)
authServer:
  replicaCount: 1

  image:
    repository: ghcr.io/agntcy/oidc-gateway
    # tag defaults to Chart.appVersion when empty; set explicitly to pin a specific release
    tag: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9002

  config:
    listenAddress: ":9002"
    logLevel: info

  # OIDC config (rendered to config.yaml, see configmap-authz.yaml)
  # All values are user-specific - provide your own via -f values.yaml or --set
  oidc:
    claims:
      principalClaim: "sub"
      emailClaimPath: "email"

    # Header emitted by ext_authz and stripped from client requests by Envoy.
    headers:
      authPrincipal: "x-auth-principal"

    # Issuer mapping for canonical principal extraction.
    # authFamily: oidc | spiffe
    # Example:
    # issuers:
    #   - providerKey: "dex"
    #     provider: "https://dex.example.com"
    #     authFamily: "oidc"
    #   - providerKey: "github"
    #     provider: "https://token.actions.githubusercontent.com"
    #     authFamily: "oidc"
    #   - providerKey: "spire"
    #     provider: "https://spire-oidc-discovery.example.org"
    #     authFamily: "spiffe"
    issuers: []

    denyList: []

    publicPaths:
      - "/healthz"
      - "/grpc.reflection"

    roles:
      # Example admin: principals: ["oidc:dex:admin@example.com"]
      admin:
        allowedMethods: ["*"]
        principals: []
      # Example viewer: restrict to specific gRPC methods or HTTP paths
      # viewer:
      #   allowedMethods:
      #     - "/example.service.v1.ExampleService/Read"
      #   principals:
      #     - "oidc:dex:viewer@example.com"
      # Example GitHub Actions workflow identity:
      # deployer:
      #   allowedMethods: ["*"]
      #   principals:
      #     - "oidc:github:repo:your-org/your-repo:workflow:deploy.yml:ref:refs/heads/main"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Ingress configuration (optional).
ingress:
  oidc:
    enabled: false
    className: nginx
    host: ""
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      external-dns.alpha.kubernetes.io/hostname: ""
      nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
      nginx.ingress.kubernetes.io/grpc-backend: "true"
    tls:
      enabled: true
      secretName: ""
  mtls:
    enabled: false
    className: nginx
    host: ""
    annotations:
      external-dns.alpha.kubernetes.io/hostname: ""
      nginx.ingress.kubernetes.io/ssl-passthrough: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "GRPCS"
    tls:
      enabled: true
      secretName: ""

# OpenShift Route configuration (alternative to Ingress for OpenShift clusters).
# Use TLS passthrough since Envoy handles TLS termination via SPIFFE SDS.
route:
  oidc:
    enabled: false
    host: ""
    annotations: {}
  mtls:
    enabled: false
    host: ""
    annotations: {}

# Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65532
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
