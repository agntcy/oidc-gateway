name: Container Security Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # Daily at 03:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read
  issues: write

jobs:
  trivy-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - ghcr.io/agntcy/oidc-gateway:latest
    steps:
      - name: Set image name
        id: image-name
        run: |
          IMAGE_NAME=$(echo "${{ matrix.image }}" | sed -E 's|.*/||; s|[:@].*||')
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          github-pat: ${{ secrets.GITHUB_TOKEN }}
          format: sarif
          output: trivy-${{ steps.image-name.outputs.name }}.sarif
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: trivy-${{ steps.image-name.outputs.name }}.sarif
          category: trivy-${{ steps.image-name.outputs.name }}

      - name: Upload report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-report-${{ steps.image-name.outputs.name }}
          path: trivy-${{ steps.image-name.outputs.name }}.sarif
          retention-days: 7
