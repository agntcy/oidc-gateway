name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:

# Declare default permissions as read-only
permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.result.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for code changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '!CHANGELOG.md'
              - '!CODE_OF_CONDUCT.md'
              - '!CONTRIBUTING.md'
              - '!LICENSE'
              - '!MAINTAINERS.md'
              - '!README.md'
              - '!RELEASE.md'
              - '!SECURITY.md'
              - '!.gitignore'

      - name: Determine result
        id: result
        run: |
          # Always run for tag pushes (releases), otherwise use paths-filter result
          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            echo "code=true" >> $GITHUB_OUTPUT
          else
            echo "code=${{ steps.filter.outputs.code }}" >> $GITHUB_OUTPUT
          fi

  tag-on-main:
    name: Verify tag is on main
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    outputs:
      eligible: ${{ steps.verify.outputs.eligible }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tagged commit is on main
        id: verify
        shell: bash
        run: |
          git fetch origin main --depth=1

          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "eligible=true" >> "$GITHUB_OUTPUT"
            echo "::notice Tag ${GITHUB_REF_NAME} points to a commit on main."
          else
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "::warning Tag ${GITHUB_REF_NAME} does not point to a commit on main. Skipping release."
          fi

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.3"
          cache-dependency-path: "**/*.sum"

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0

      - name: Setup lint cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/golangci-lint
            ~/.cache/go-build
          key: lint-cache-${{ runner.os }}-${{ hashFiles('**/*.sum') }}
          restore-keys: |
            lint-cache-${{ runner.os }}-

      - name: Run linters
        run: task lint

  license:
    name: License
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0

      - name: Setup license cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            **/.licensei.cache
          key: license-cache-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            license-cache-${{ runner.os }}-

      - name: License cache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: task license:cache

      - name: License check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: task license

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.3"
          cache-dependency-path: "**/*.sum"

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0

      - name: Generate coverage report
        run: task test:unit:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-unit
          path: .coverage/**/*.out
          include-hidden-files: true
          retention-days: 1

  build:
    name: Build
    needs:
      - lint
      - license
      - test
    uses: ./.github/workflows/reusable-build.yaml
    permissions:
      contents: read
      packages: write
    with:
      image_repo: ghcr.io/agntcy
      image_tag: ${{ github.sha }}

  push:
    name: Push
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs:
      - lint
      - license
      - test
    uses: ./.github/workflows/reusable-build.yaml
    permissions:
      contents: read
      packages: write
    with:
      image_repo: ghcr.io/agntcy
      image_tag: latest
      push: true

  helm-push-latest:
    name: Helm push (latest)
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs:
      - push
    uses: ./.github/workflows/reusable-release-helm.yaml
    permissions:
      contents: read
      packages: write
    with:
      image_repo: ghcr.io/agntcy
      release_tag: 0.0.0-latest

  release:
    name: Release
    if: ${{ startsWith(github.ref, 'refs/tags/') && needs.tag-on-main.outputs.eligible == 'true' }}
    needs:
      - tag-on-main
      - lint
      - license
      - test
    uses: ./.github/workflows/reusable-release.yaml
    permissions:
      contents: write
      packages: write
    with:
      image_repo: ghcr.io/agntcy
      release_tag: ${{ github.ref_name }}

  upload-codecov:
    name: Upload coverage to Codecov
    needs:
      - changes
      - test
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-unit
          path: .coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          codecov_yml_path: codecov.yml
          files: "**/*.out"
          flags: unit
          verbose: true
          use_oidc: true

  success:
    name: Success
    if: ${{ !cancelled() && !contains(needs.*.result, 'cancelled') && !contains(needs.*.result, 'failure') }}
    needs:
      - changes
      - lint
      - license
      - test
      - build
      - push
      - helm-push-latest
      - tag-on-main
      - release
      - upload-codecov
    runs-on: ubuntu-latest
    steps:
      - name: Echo Success
        run: |
          if [[ "${{ needs.changes.outputs.code }}" == "true" ]]; then
            echo "::notice Success! All code checks passed."
          else
            echo "::notice Success! No code changes detected, skipped builds and tests."
          fi
