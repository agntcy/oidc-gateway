name: Test E2E

on:
  workflow_call:
    inputs:
      image_repo:
        required: true
        type: string
        description: "Image repo to use."
      image_tag:
        required: true
        type: string
        description: "Image tag to use."
      dir_version:
        required: false
        type: string
        description: "Directory (dir) component version for the test environment."
        default: "v1.4.0"

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Login to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: notused
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.3"
          cache-dependency-path: "**/*.sum"
          cache: true

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: oidc-gateway
          path: tmp/artifacts

      - name: Load images to local Docker registry
        run: |
          docker load --input tmp/artifacts/oidc-gateway.tar
          docker images

      - name: Pull Directory dependency images
        run: |
          docker pull ${{ inputs.image_repo }}/dir-apiserver:${{ inputs.dir_version }}
          docker pull ${{ inputs.image_repo }}/dir-reconciler:${{ inputs.dir_version }}

      - name: Install test environment tooling
        run: |
          task deps

      - name: Run end-to-end tests
        env:
          CI: "true"
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          task tests:e2e:test:default
