name: Release Helm

on:
  workflow_dispatch:
    inputs:
      image_repo:
        required: true
        type: string
        description: "Image repo to use."
        default: "ghcr.io/agntcy"
      release_tag:
        required: true
        type: string
        description: "Release tag for all components."
  workflow_call:
    inputs:
      image_repo:
        required: true
        type: string
        description: "Image repo to use."
      release_tag:
        required: true
        type: string
        description: "Release tag for all components."
      chart_path:
        required: false
        type: string
        description: "Chart path component (e.g., 'oidc-gateway' or 'oidc-gateway-dev'). Defaults to 'oidc-gateway'."
        default: "oidc-gateway"

jobs:
  chart:
    name: Helm chart
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: notused
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Helm update dependencies
        shell: bash
        run: helm dependency update install/charts/oidc-gateway

      - name: Helm lint
        shell: bash
        run: helm lint install/charts/oidc-gateway --with-subcharts

      - name: Helm package
        id: build
        shell: bash
        run: |
          helm package install/charts/oidc-gateway --dependency-update --version ${{ inputs.release_tag }}
          echo "package=oidc-gateway-${{ inputs.release_tag }}.tgz" >> "$GITHUB_OUTPUT"

      - name: Helm push to GHCR OCI registry
        shell: bash
        run: |
          CHART_PATH="${{ inputs.chart_path || 'oidc-gateway' }}/helm-charts"
          echo "🚧 Pushing ${{ steps.build.outputs.package }} to GHCR OCI registry"
          echo "Chart path: ${CHART_PATH}"
          helm push ${{ steps.build.outputs.package }} oci://${{ inputs.image_repo }}/${CHART_PATH}
