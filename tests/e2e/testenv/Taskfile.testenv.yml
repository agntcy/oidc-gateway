version: "3"

includes:
  setup-testenv-k8s:
    taskfile: ../../modules/Taskfile.setup-testenv-k8s.yml
    dir: ../../
    internal: true
    vars:
      DIR_VERSION: "v1.4.0"
      KIND_CLUSTER_NAME: "oidc-gateway-testenv"
      KIND_CONFIG_PATH: "{{.ROOT_DIR}}/tests/e2e/testenv/kind-cluster.yaml"
      KIND_EXTRA_IMAGES: |
        {{ .IMAGE_REPO }}/dir-reconciler:{{.DIR_VERSION}}
        {{ .IMAGE_REPO }}/dir-apiserver:{{.DIR_VERSION}}
        {{ .IMAGE_REPO }}/oidc-gateway:{{.IMAGE_TAG}}
      CHART_DEPLOYMENTS: |
        [
          {
            "release_name": "dex",
            "namespace": "dex",
            "chart_repository": "https://charts.dexidp.io",
            "chart_ref": "dex",
            "chart_version": "0.24.1",
            "helm_repo_name": "dexidp",
            "chart_values_path": "{{.ROOT_DIR}}/tests/e2e/testenv/dex-chart-values.yaml"
          },
          {
            "release_name": "dir",
            "namespace": "dir",
            "chart_repository": "oci://ghcr.io/agntcy/dir/helm-charts/dir",
            "chart_version": "{{.DIR_VERSION}}",
            "chart_values_path": "{{.ROOT_DIR}}/tests/e2e/testenv/dir-chart-values.yaml",
            "chart_extra_values": [
              "--set apiserver.image.tag={{.DIR_VERSION}}",
              "--set apiserver.reconciler.image.tag={{.DIR_VERSION}}"
            ]
          },
          {
            "release_name": "oidc-gateway",
            "namespace": "oidc-gateway",
            "chart_path": "{{.ROOT_DIR}}/install/charts/oidc-gateway",
            "chart_values_path": "{{.ROOT_DIR}}/tests/e2e/default/testenv/oidc-gateway-chart-values.yaml",
            "chart_extra_values": [
              "--set authServer.image.tag={{.IMAGE_TAG}}",
              "--set authServer.image.pullPolicy=IfNotPresent"
            ]
          }
        ]

  deploy-chart:
    taskfile: ../../modules/Taskfile.deploy-chart.yml
    internal: true

tasks:
  up:
    desc: Create the shared Kind test environment (initial oidc-gateway profile is default)
    deps:
      - task: ::build
    cmds:
      - task: setup-testenv-k8s:up

  down:
    desc: Delete the shared Kind test environment
    cmds:
      - task: setup-testenv-k8s:down

  oidc-gateway:apply:
    desc: Switch the oidc-gateway Helm release to a profile (helm upgrade)
    vars:
      PROFILE: '{{ .PROFILE | default "default" }}'
      KIND_CLUSTER_NAME: "oidc-gateway-testenv"
      KUBE_CONTEXT: 'kind-{{ .KIND_CLUSTER_NAME }}'
      KUBECTL_BIN: '{{ .KUBECTL_BIN | default "kubectl" }}'
      HELM_BIN: '{{ .HELM_BIN | default "helm" }}'
      SETUP_TIMEOUT: '{{ .SETUP_TIMEOUT | default "60s" }}'
      CHART_VALUES_PATH: "{{.ROOT_DIR}}/tests/e2e/{{.PROFILE}}/testenv/oidc-gateway-chart-values.yaml"
    cmds:
      - |
        echo "Applying oidc-gateway profile: {{.PROFILE}}"
      - task: deploy-chart:up
        vars:
          HELM_BIN: '{{ .HELM_BIN }}'
          RELEASE_NAME: oidc-gateway
          NAMESPACE: oidc-gateway
          CHART_PATH: "{{.ROOT_DIR}}/install/charts/oidc-gateway"
          CHART_VALUES_PATH: '{{ .CHART_VALUES_PATH }}'
          CHART_EXTRA_VALUES: |
            --set authServer.image.tag={{.IMAGE_TAG}}
            --set authServer.image.pullPolicy=IfNotPresent
          CHART_WAIT: "true"
          KUBE_CONTEXT: '{{ .KUBE_CONTEXT }}'
      - |
        sleep 10
        {{ .KUBECTL_BIN }} wait --for=condition=ready --timeout={{.SETUP_TIMEOUT}} \
          pods -n oidc-gateway \
          -l app.kubernetes.io/instance=oidc-gateway \
          --context {{ .KUBE_CONTEXT }}
